<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!--
    Calibra standalone icon — 80×80, transparent background.

    Concept: vernier caliper jaw. "Calibra" derives from "calibrate" —
    the act of precise measurement with a calibration instrument.

    Geometry:
      C-arc: center (40,40), radius 22, ±38° gap at 3-o'clock.
        Bottom endpoint: (40+22·cos38°, 40+22·sin38°) = (57.3, 53.5)
        Top    endpoint: (57.3, 26.5)
        Path: M bottom A large-arc clockwise to top → the 284° C-arc.
      Jaw lines: two horizontals extending right from the gap endpoints.

    Color: #F59E0B (amber-400) — "calibration gold" / gold standard.
    No background, no gradients. Works on light and dark surfaces.
  -->

  <!-- C-arc: clockwise (sweep=1), large arc (large-arc=1) -->
  <path
    d="M 57.3 53.5 A 22 22 0 1 1 57.3 26.5"
    fill="none"
    stroke="#F59E0B"
    stroke-width="5"
    stroke-linecap="round"/>

  <!-- Upper jaw -->
  <line x1="57.3" y1="26.5" x2="70"   y2="26.5"
        stroke="#F59E0B" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Lower jaw -->
  <line x1="57.3" y1="53.5" x2="70"   y2="53.5"
        stroke="#F59E0B" stroke-width="4.5" stroke-linecap="round"/>
</svg>
