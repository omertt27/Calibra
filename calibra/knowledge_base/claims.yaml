claims:
  - id: "ENT-001"
    metric: "action_entropy"
    class: "any"
    status: "provisional"
    confidence: "MEDIUM"
    assertion: "Action-space entropy below 3 bits/dim indicates high trajectory redundancy and is a risk signal for weak policy generalisation to out-of-distribution states"
    evidence_count: 4
    evidence_datasets:
      - lerobot/pusht  # ✓ 5.3
      - lerobot/aloha_sim_insertion_human  # ✓ 4.45
      - lerobot/aloha_mobile_cabinet  # ✓ 4.24
      - lerobot/droid_100  # ✓ 4.24
    falsification: "A dataset with action entropy below 3 bits/dim where the trained policy achieves strong OOD generalisation, OR a dataset with entropy above 4.5 bits/dim where the policy fails OOD"
    pending_tests:
      - lerobot/libero
    caution: |
      Treat as a useful heuristic, not a validated law.
      Some tasks legitimately require low entropy (e.g.
      peg insertion).
      Some tasks fail despite high entropy.
      Control mode distorts interpretation.
      The link to downstream OOD failure has NOT been directly measured — it is inferred from first principles.
      Requires ablation studies on held-out test sets before upgrading to active_hypothesis..

