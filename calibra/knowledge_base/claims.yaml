    pending_tests:
      - DROID
      - lerobot/libero
    caution: |
      Treat as a useful heuristic, not a validated law.
      Some tasks legitimately require low entropy (e.g.
      peg insertion).
      Some tasks fail despite high entropy.
      Control mode distorts interpretation.
      The link to downstream OOD failure has NOT been directly measured — it is inferred from first principles.
      Requires ablation studies on held-out test sets before upgrading to active_hypothesis..

